<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="IBM Plex Sans, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C73E1D"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#FAF8F2"/>

  <!-- Title -->
  <text x="450" y="38" font-family="IBM Plex Serif, Georgia, serif" font-size="22" font-weight="500" text-anchor="middle" fill="#1A1A1A">PARALLAX — Multi-Agent Investigation Flow</text>
  <text x="450" y="58" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" letter-spacing="2" text-anchor="middle" fill="#8B8F96">DIRECTOR · SPECIALISTS · SKILLS · SYNTHESIS</text>

  <!-- User input -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="170" height="60" fill="#FFFFFF" stroke="#C9C3B5"/>
    <text x="10" y="20" font-family="IBM Plex Mono" font-size="9" letter-spacing="1.5" fill="#8B8F96">USER · TASKING</text>
    <text x="10" y="38" font-family="IBM Plex Serif" font-size="13" font-style="italic" fill="#4A4F58">scenario + question</text>
    <text x="10" y="52" font-family="IBM Plex Mono" font-size="10" fill="#8B8F96">POST /api/investigate</text>
  </g>
  <line x1="210" y1="140" x2="270" y2="140" stroke="#1A1A1A" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Director -->
  <g transform="translate(270, 100)">
    <rect x="0" y="0" width="200" height="80" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <circle cx="14" cy="18" r="5" fill="#2C2C2C"/>
    <text x="26" y="22" font-family="IBM Plex Serif" font-size="17" font-weight="500" fill="#1A1A1A">Director Agent</text>
    <text x="14" y="42" font-family="IBM Plex Mono" font-size="9.5" fill="#8B8F96">Plans · delegates · decides</text>
    <text x="14" y="58" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">tools = consult_*</text>
    <text x="14" y="72" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">model = claude-sonnet-4-5</text>
  </g>

  <!-- Three delegation arrows down -->
  <line x1="320" y1="180" x2="180" y2="240" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="370" y1="180" x2="370" y2="240" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="420" y1="180" x2="560" y2="240" stroke="#1A1A1A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Statistician -->
  <g transform="translate(80, 240)">
    <rect x="0" y="0" width="200" height="80" fill="#FFFFFF" stroke="#3B4F8C" stroke-width="1.2"/>
    <circle cx="14" cy="18" r="5" fill="#3B4F8C"/>
    <text x="26" y="22" font-family="IBM Plex Serif" font-size="15" font-weight="500" fill="#1A1A1A">Statistician</text>
    <text x="14" y="40" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">SKILLS:</text>
    <text x="14" y="54" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">compare_distributions</text>
    <text x="14" y="66" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">test_mean_difference</text>
  </g>

  <!-- Reliability -->
  <g transform="translate(280, 240)">
    <rect x="0" y="0" width="180" height="80" fill="#FFFFFF" stroke="#A06A1F" stroke-width="1.2"/>
    <circle cx="14" cy="18" r="5" fill="#A06A1F"/>
    <text x="26" y="22" font-family="IBM Plex Serif" font-size="15" font-weight="500" fill="#1A1A1A">Reliability Eng.</text>
    <text x="14" y="40" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">SKILLS:</text>
    <text x="14" y="54" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">fit_weibull (MLE+censor)</text>
    <text x="14" y="66" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">compute_b10_life</text>
  </g>

  <!-- Pattern -->
  <g transform="translate(460, 240)">
    <rect x="0" y="0" width="200" height="80" fill="#FFFFFF" stroke="#4A6B3A" stroke-width="1.2"/>
    <circle cx="14" cy="18" r="5" fill="#4A6B3A"/>
    <text x="26" y="22" font-family="IBM Plex Serif" font-size="15" font-weight="500" fill="#1A1A1A">Pattern Detective</text>
    <text x="14" y="40" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">SKILL:</text>
    <text x="14" y="54" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">score_lot_outliers</text>
    <text x="14" y="66" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">(MAD-standardized)</text>
  </g>

  <!-- Findings return -->
  <line x1="180" y1="320" x2="320" y2="370" stroke="#8B8F96" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="370" y1="320" x2="370" y2="370" stroke="#8B8F96" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <line x1="560" y1="320" x2="420" y2="370" stroke="#8B8F96" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#arr)"/>

  <text x="190" y="345" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">finding</text>
  <text x="380" y="345" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">finding</text>
  <text x="490" y="345" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">finding</text>

  <!-- Synthesis -->
  <g transform="translate(290, 380)">
    <rect x="0" y="0" width="160" height="60" fill="#FFFFFF" stroke="#C73E1D" stroke-width="1.5"/>
    <circle cx="14" cy="18" r="5" fill="#C73E1D"/>
    <text x="26" y="22" font-family="IBM Plex Serif" font-size="15" font-weight="500" fill="#1A1A1A">Synthesis</text>
    <text x="14" y="40" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">STRICT JSON OUTPUT</text>
    <text x="14" y="52" font-family="IBM Plex Mono" font-size="10" fill="#4A4F58">headline · evidence · recs</text>
  </g>

  <!-- Brief out -->
  <line x1="450" y1="410" x2="510" y2="410" stroke="#C73E1D" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <g transform="translate(510, 380)">
    <rect x="0" y="0" width="180" height="60" fill="#FFFFFF" stroke="#C9C3B5"/>
    <text x="10" y="20" font-family="IBM Plex Mono" font-size="9" letter-spacing="1.5" fill="#C73E1D">USER · BRIEF</text>
    <text x="10" y="40" font-family="IBM Plex Serif" font-size="13" font-style="italic" fill="#4A4F58">stakeholder-facing</text>
    <text x="10" y="54" font-family="IBM Plex Mono" font-size="10" fill="#8B8F96">streamed via SSE</text>
  </g>

  <!-- Side: streaming bus -->
  <rect x="730" y="100" width="140" height="340" fill="#FFFFFF" stroke="#C9C3B5"/>
  <text x="800" y="120" font-family="IBM Plex Mono" font-size="9.5" letter-spacing="1.5" text-anchor="middle" fill="#8B8F96">SSE EVENT STREAM</text>
  <line x1="745" y1="128" x2="855" y2="128" stroke="#E5E0D5"/>
  <g font-family="IBM Plex Mono" font-size="9.5" fill="#4A4F58">
    <text x="745" y="146">investigation_start</text>
    <text x="745" y="162">director_thought</text>
    <text x="745" y="178">subagent_invoked</text>
    <text x="745" y="194">subagent_thought</text>
    <text x="745" y="210">skill_call</text>
    <text x="745" y="226">skill_result</text>
    <text x="745" y="242">subagent_finding</text>
    <text x="745" y="258">director_thought</text>
    <text x="745" y="274">subagent_invoked</text>
    <text x="745" y="290">…</text>
    <text x="745" y="306">subagent_finding</text>
    <text x="745" y="322">synthesis</text>
    <text x="745" y="338">done</text>
  </g>
  <text x="745" y="370" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">Each event renders</text>
  <text x="745" y="382" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">into the live agent</text>
  <text x="745" y="394" font-family="IBM Plex Mono" font-size="9" fill="#8B8F96">timeline as it arrives.</text>

  <!-- Bottom annotation -->
  <line x1="40" y1="490" x2="860" y2="490" stroke="#E5E0D5"/>
  <text x="40" y="510" font-family="IBM Plex Mono" font-size="9" letter-spacing="1.5" fill="#8B8F96">DELEGATION PROTOCOL</text>
  <text x="40" y="528" font-family="IBM Plex Sans" font-size="11" fill="#4A4F58">
    Director invokes specialists via tool calls (consult_*).  Specialists run their own bounded tool-call loop against curated skills.
  </text>
  <text x="40" y="544" font-family="IBM Plex Sans" font-size="11" fill="#4A4F58">
    Synthesis pass receives all skill outputs and director context; emits a single strict-JSON brief.  Everything streams over SSE.
  </text>
</svg>
